services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_SECRET_KEY=change-me-in-prod
      - SEARXNG_RATE_LIMIT=false
      - SEARXNG_BASE_URL=http://localhost:8080
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  crawl4ai:
    image: unclecode/crawl4ai:latest
    environment:
      - CRAWL4AI_API_TOKEN=crawl4ai-local-token
    ports:
      - "11235:11235"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${ECR_REGISTRY:-public.ecr.aws}/accom-agent:${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=us-east-1
      - ES_HOST=elasticsearch
      - REDIS_HOST=redis
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
      crawl4ai:
        condition: service_started
    restart: unless-stopped
